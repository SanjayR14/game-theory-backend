apiVersion: apps/v1
kind: Deployment

metadata:
  name: game-theory-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: game-theory-backend

  template:
    metadata:
      labels:
        app: game-theory-backend

    spec:
      containers:
      - name: backend
        image: YOUR_DOCKER_USERNAME/node-app:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 5000
